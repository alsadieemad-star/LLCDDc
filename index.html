<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة السعدي - النسخة المعتمدة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --save: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 5px solid var(--primary); background: #f9f9f9; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .input-group { background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; display: flex; flex-direction: column; }
        label { font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        textarea { min-height: 100px; }
        .action-btns { display: flex; gap: 10px; margin: 20px 0; }
        .btn-save { flex: 3; background: var(--save); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .preview-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .classic-card { background: white; border: 1px solid #333; padding: 30px; min-height: 400px; }
        .marc-view { background: #282c34; color: #9cdcfe; padding: 15px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .data-table th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <h1>منصة السعدي للفهرسة - مجهود الأستاذ عماد السعدي</h1>
</header>

<nav class="nav-tabs">
    <button class="active" onclick="tab('p1', this)">📚 الكتب</button>
    <button onclick="tab('p2', this)">📜 المخطوطات</button>
    <button onclick="tab('p3', this)">📊 السجل</button>
</nav>

<div class="container">
    <div id="p1" class="page active">
        <div class="card">
            <div class="grid-form">
                <div class="input-group"><label>تصنيف ديوي:</label><input type="text" id="b082" oninput="upB()"></div>
                <div class="input-group"><label>تصنيف الكونجرس:</label><input type="text" id="b050" oninput="upB()"></div>
                <div class="input-group"><label>المؤلف (100):</label><input type="text" id="b100" oninput="upB()"></div>
                <div class="input-group"><label>العنوان (245):</label><input type="text" id="b245" oninput="upB()"></div>
                <div class="input-group"><label>الناشر (260):</label><input type="text" id="b260" oninput="upB()"></div>
                <div class="input-group"><label>الوصف المادي (300):</label><input type="text" id="b300" oninput="upB()"></div>
                <div class="input-group"><label>الموضوعات (6xx):</label><input type="text" id="b600" oninput="upB()"></div>
                <div class="input-group"><label>ملاحظة ببليوجرافية (504):</label><textarea id="b504" oninput="upB()"></textarea></div>
                <div class="input-group"><label>مصدر التزويد (900):</label><textarea id="b900" oninput="upB()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>الرابط الإلكتروني (856):</label><input type="text" id="b856" oninput="upB()"></div>
            </div>
            <button class="btn-save" onclick="saveData('كتاب')">حفظ الكتاب</button>
        </div>
        <div class="preview-area"><div id="bC" class="classic-card"></div><div id="bM" class="marc-view"></div></div>
    </div>

    <div id="p2" class="page">
        <div class="card">
            <div class="grid-form">
                <div class="input-group"><label>عنوان المخطوط:</label><input type="text" id="m245" oninput="upM()"></div>
                <div class="input-group"><label>اسم المؤلف:</label><input type="text" id="mAut" oninput="upM()"></div>
                <div class="input-group"><label>المصدر:</label><input type="text" id="mSrc" oninput="upM()"></div>
                <div class="input-group"><label>اسم الناسخ:</label><input type="text" id="mScr" oninput="upM()"></div>
                <div class="input-group"><label>تاريخ النسخ:</label><input type="text" id="mDate" oninput="upM()"></div>
                <div class="input-group"><label>رقم الحفظ:</label><input type="text" id="mCla" oninput="upM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>بداية المخطوط:</label><textarea id="mSta" oninput="upM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>نهاية المخطوط:</label><textarea id="mEnd" oninput="upM()"></textarea></div>
            </div>
            <button class="btn-save" onclick="saveData('مخطوط')">حفظ المخطوط</button>
        </div>
        <div class="preview-area"><div id="mC" class="classic-card"></div><div id="mM" class="marc-view"></div></div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <button onclick="exportX()" style="margin-bottom:10px;">تصدير Excel</button>
            <table class="data-table">
                <thead><tr><th>النوع</th><th>العنوان</th><th>المؤلف/الناسخ</th><th>المصدر</th><th>التاريخ</th></tr></thead>
                <tbody id="sBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let db = [];
    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function upB() {
        const v = id => document.getElementById(id).value;
        document.getElementById('bC').innerHTML = `<b>المؤلف:</b> ${v('b100')}<br><b>العنوان:</b> ${v('b245')}<br><b>الرابط:</b> ${v('b856')}`;
        document.getElementById('bM').innerHTML = `100 $a ${v('b100')}\n245 $a ${v('b245')}\n504 $a ${v('b504')}\n856 $u ${v('b856')}`;
    }
    function upM() {
        const v = id => document.getElementById(id).value;
        document.getElementById('mC').innerHTML = `<b>العنوان:</b> ${v('m245')}<br><b>الناسخ:</b> ${v('mScr')}<br><b>التاريخ:</b> ${v('mDate')}`;
        document.getElementById('mM').innerHTML = `245 $a ${v('m245')}\n500 $a الناسخ: ${v('mScr')}\n500 $a التاريخ: ${v('mDate')}`;
    }
    function saveData(t) {
        const v = id => document.getElementById(id).value;
        let r = (t==='كتاب') ? {t, tit:v('b245'), aut:v('b100'), src:v('b260'), date:v('b856')} : {t, tit:v('m245'), aut:v('mScr'), src:v('mSrc'), date:v('mDate')};
        db.push(r);
        document.getElementById('sBody').innerHTML = db.map(i => `<tr><td>${i.t}</td><td>${i.tit}</td><td>${i.aut}</td><td>${i.src}</td><td>${i.date}</td></tr>`).join('');
        alert("تم الحفظ");
    }
    function exportX() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Sadi_Data.xlsx");
    }
</script>
</body>
</html>
