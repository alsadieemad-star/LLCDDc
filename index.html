<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة السعدي - الإصدار الأكاديمي الشامل والنهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --save: #27ae60; --clear: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #555; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 5px solid var(--primary); background: #f9f9f9; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .section-title { color: var(--secondary); border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 5px; font-weight: bold; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .input-group { background: #fafafa; padding: 10px; border-radius: 8px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .repeat-box { border: 1px dashed var(--primary); padding: 8px; margin-top: 5px; border-radius: 5px; display: flex; gap: 5px; }
        label { font-weight: bold; font-size: 0.85rem; color: var(--primary); margin-bottom: 5px; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; margin-top: 5px; width: fit-content; }
        .action-btns { display: flex; gap: 10px; margin: 20px 0; }
        .btn-save-main { flex: 3; background: var(--save); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-clear { flex: 1; background: var(--clear); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .preview-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .classic-card { background: white; border: 1px solid #333; padding: 30px; font-family: 'Times New Roman', serif; min-height: 400px; line-height: 1.6; }
        .marc-view { background: #282c34; color: #9cdcfe; padding: 15px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; background: white; }
        .data-table th { background: var(--primary); color: white; padding: 10px; border: 1px solid #ddd; }
        .data-table td { padding: 8px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>منصة السعدي - الإصدار الأكاديمي الشامل</h1>
    <p>بإشراف الخبير الأستاذ عماد كاظم السعدي © 2026</p>
</header>

<nav class="nav-tabs">
    <button class="active" onclick="tab('p2', this)">📚 فهرسة الكتب</button>
    <button onclick="tab('p3', this)">📜 فهرسة المخطوطات</button>
    <button onclick="tab('p4', this)">📊 السجل العام (Sheet)</button>
</nav>

<div class="container">

    <div id="p2" class="page active">
        <div class="card">
            <h3 class="section-title">فهرسة الكتب - الحقول المتكررة (MARC21)</h3>
            <div class="grid-form" id="bookForm">
                <div class="input-group"><label>تصنيف ديوي (082):</label><input type="text" id="b082" oninput="upB()"></div>
                <div class="input-group"><label>تصنيف الكونجرس (050):</label><input type="text" id="b050" oninput="upB()"></div>
                <div class="input-group"><label>المؤلف (100):</label><input type="text" id="b100" oninput="upB()"></div>
                <div class="input-group"><label>العنوان (245$a):</label><input type="text" id="b245" oninput="upB()"></div>
                <div class="input-group"><label>بيان المسؤولية (245$c):</label><input type="text" id="b245c" oninput="upB()"></div>
                <div class="input-group" id="isbn-area"><label>ISBN (020) - متكرر:</label><div class="repeat-box"><input type="text" class="b020" oninput="upB()"></div><button class="btn-add" onclick="addInp('isbn-area', 'b020')">+ إضافة ISBN</button></div>
                <div class="input-group" id="pub-area"><label>بيانات النشر (260) - متكرر:</label><div class="repeat-box"><input type="text" class="b260" oninput="upB()"></div><button class="btn-add" onclick="addInp('pub-area', 'b260')">+ إضافة ناشر</button></div>
                <div class="input-group"><label>الوصف المادي (300):</label><input type="text" id="b300" oninput="upB()"></div>
                <div class="input-group" id="sub-area"><label>الموضوعات (6xx) - متكرر:</label><div class="repeat-box"><select class="b6type" onchange="upB()"><option value="650">650</option><option value="600">600</option><option value="610">610</option></select><input type="text" class="b6val" oninput="upB()"></div><button class="btn-add" onclick="addSub()">+ إضافة موضوع</button></div>
                <div class="input-group"><label>ملاحظات (500):</label><input type="text" id="b500" oninput="upB()"></div>
                <div class="input-group"><label>ملخص (520):</label><textarea id="b520" oninput="upB()"></textarea></div>
                <div class="input-group"><label>تزويد (900):</label><input type="text" id="b900" oninput="upB()"></div>
            </div>
            <div class="action-btns">
                <button class="btn-save-main" onclick="saveToSheet('كتاب')">💾 حفظ الكتاب في السجل</button>
                <button class="btn-clear" onclick="clearForm('bookForm')">🧹 مسح الحقول</button>
            </div>
        </div>
        <div class="preview-area"><div id="bC" class="classic-card"></div><div id="bM" class="marc-view"></div></div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <h3 class="section-title">فهرسة المخطوطات (الهيكل الأكاديمي الشامل)</h3>
            <div class="grid-form" id="manuForm">
                <div class="input-group"><label>العنوان الرئيسي:</label><input type="text" id="m245" oninput="upM()"></div>
                <div class="input-group"><label>المؤلف:</label><input type="text" id="mAut" oninput="upM()"></div>
                <div class="input-group"><label>المصدر (المكتبة/الخزانة):</label><input type="text" id="mSrc" oninput="upM()"></div>
                <div class="input-group"><label>اسم الناسخ:</label><input type="text" id="mScr" oninput="upM()"></div>
                <div class="input-group"><label>تاريخ النسخ:</label><input type="text" id="mDate" oninput="upM()"></div>
                <div class="input-group"><label>رقم الحفظ (التصنيف):</label><input type="text" id="mCla" oninput="upM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>أول المخطوط:</label><textarea id="mSta" oninput="upM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>آخر المخطوط:</label><textarea id="mEnd" oninput="upM()"></textarea></div>
                <div class="input-group"><label>الموضوع:</label><input type="text" id="mSub" oninput="upM()"></div>
                <div class="input-group"><label>الملاحظات الوصفية:</label><input type="text" id="mNot" oninput="upM()"></div>
            </div>
            <div class="action-btns">
                <button class="btn-save-main" onclick="saveToSheet('مخطوط')">💾 حفظ المخطوط في السجل</button>
                <button class="btn-clear" onclick="clearForm('manuForm')">🧹 مسح الحقول</button>
            </div>
        </div>
        <div class="preview-area"><div id="mC" class="classic-card"></div><div id="mM" class="marc-view"></div></div>
    </div>

    <div id="p4" class="page">
        <div class="card">
            <button onclick="exportExcel()" style="float:left; padding:8px; background:#2c3e50; color:white; border:none; border-radius:5px; cursor:pointer;">📥 تصدير للسجل (Excel)</button>
            <h3 class="section-title">📊 السجل العام للبيانات</h3>
            <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>النوع</th><th>العنوان</th><th>المؤلف/الناسخ</th><th>الناشر/المصدر</th><th>التاريخ</th><th>الموضوع</th></tr></thead><tbody id="sheetBody"></tbody></table></div>
        </div>
    </div>

</div>

<script>
    let sheetData = [];
    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function addInp(areaId, cls) {
        const div = document.createElement('div'); div.className = 'repeat-box';
        div.innerHTML = `<input type="text" class="${cls}" oninput="upB()">`;
        const area = document.getElementById(areaId); area.insertBefore(div, area.querySelector('.btn-add'));
    }
    function addSub() {
        const div = document.createElement('div'); div.className = 'repeat-box';
        div.innerHTML = `<select class="b6type" onchange="upB()"><option value="650">650</option><option value="600">600</option><option value="610">610</option></select><input type="text" class="b6val" oninput="upB()">`;
        const area = document.getElementById('sub-area'); area.insertBefore(div, area.querySelector('.btn-add'));
    }
    function upB() {
        const v = id => document.getElementById(id)?.value || "";
        const all = cls => Array.from(document.getElementsByClassName(cls)).map(i => i.value).filter(x => x);
        document.getElementById('bC').innerHTML = `<b>${v('b100')}</b><br>${v('b245')}. -- ${all('b260').join(' ; ')}. -- ${v('b300')}.`;
        document.getElementById('bM').innerHTML = `100 1# $a ${v('b100')}\n245 10 $a ${v('b245')} $c ${v('b245c')}\n${all('b260').map(p=>`260 ## $a ${p}`).join('\n')}`;
    }
    function upM() {
        const v = id => document.getElementById(id).value || "";
        document.getElementById('mC').innerHTML = `<center><b>بِطاقة مَخطوط</b></center><br><b>العنوان:</b> ${v('m245')}<br><b>المؤلف:</b> ${v('mAut')}<br><b>المصدر:</b> ${v('mSrc')}<br><b>الناسخ:</b> ${v('mScr')}<br><b>تاريخ النسخ:</b> ${v('mDate')}<br><hr><b>أوله:</b> ${v('mSta')}`;
        document.getElementById('mM').innerHTML = `100 $a ${v('mAut')}\n245 $a ${v('m245')}\n500 $a المصدر: ${v('mSrc')}\n500 $a الناسخ: ${v('mScr')}\n500 $a تاريخ النسخ: ${v('mDate')}`;
    }
    function saveToSheet(type) {
        const v = id => document.getElementById(id)?.value || "";
        const all = cls => Array.from(document.getElementsByClassName(cls)).map(i => i.value).filter(x=>x).join(' | ');
        let rec = (type==='كتاب') ? 
            { t: 'كتاب', tit: v('b245'), aut: v('b100'), src: all('b260'), date: '-', sub: all('b6val') } : 
            { t: 'مخطوط', tit: v('m245'), aut: v('mScr'), src: v('mSrc'), date: v('mDate'), sub: v('mSub') };
        sheetData.push(rec);
        document.getElementById('sheetBody').innerHTML = sheetData.map(r => `<tr><td>${r.t}</td><td>${r.tit}</td><td>${r.aut}</td><td>${r.src}</td><td>${r.date}</td><td>${r.sub}</td></tr>`).join('');
        alert("تم حفظ البيانات بنجاح!");
    }
    function clearForm(id) {
        if(confirm("هل تريد مسح كافة الحقول؟")) {
            const f = document.getElementById(id); f.querySelectorAll('input, textarea').forEach(i => i.value = "");
            f.querySelectorAll('.repeat-box').forEach((box, idx) => { if(idx > 0) box.remove(); });
            upB(); upM();
        }
    }
    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(sheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Sadi_Full_Database.xlsx");
    }
</script>
</body>
</html>
