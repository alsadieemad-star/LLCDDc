<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السعدي للفهرسة الاحترافية - الإصدار الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --accent: #27ae60; --bg: #f4f7f6; --code-bg: #282c34; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #555; }
        .nav-tabs button.active { color: var(--primary); background: #f9f9f9; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .input-group { display: flex; flex-direction: column; background: #fafafa; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; margin-bottom: 4px; font-size: 0.85rem; color: var(--primary); }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        .preview-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 25px; }
        .classic-card { width: 100%; min-height: 350px; border: 1px solid #333; padding: 30px; font-family: 'Times New Roman', serif; position: relative; line-height: 1.6; background: #fff; font-size: 1.1rem; }
        .card-class { position: absolute; top: 30px; right: 30px; font-weight: bold; text-align: left; }
        .card-body { margin-right: 110px; text-align: justify; }
        .marc-view { background: var(--code-bg); color: #9cdcfe; padding: 15px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; }
        .tag { color: #e06c75; font-weight: bold; }
        .sub { color: #d19a66; }
        .btn { padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        footer { background: var(--primary); color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>نظام السعدي المتكامل للفهرسة والاستناد</h1>
    <p>بإشراف الأستاذ عماد كاظم السعدي © 2026</p>
</header>

<nav class="nav-tabs no-print">
    <button id="bt1" class="active" onclick="tab('p1', 'bt1')">🔍 البحث</button>
    <button id="bt2" onclick="tab('p2', 'bt2')">📚 الكتب</button>
    <button id="bt3" onclick="tab('p3', 'bt3')">📜 المخطوطات</button>
</nav>

<div class="container">

    <div id="p1" class="page active">
        <div class="card">
            <h3>الملف الاستنادي (Excel)</h3>
            <input type="file" id="xl" accept=".xlsx, .xls">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="q" style="flex:2;" placeholder="ابحث هنا...">
                <button class="btn" style="background:var(--primary)" onclick="doSearch()">بحث</button>
                <button class="btn" style="background:var(--secondary)" onclick="clr()">تفريغ النتائج</button>
            </div>
            <div id="res" style="margin-top:15px; overflow-x:auto;"></div>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="card no-print">
            <h3>بيانات الفهرسة الموضوعية والملاحظات (الكتب)</h3>
            <div class="grid-form">
                <div class="input-group"><label>ديوي (082):</label><input type="text" id="b082" oninput="upB()"></div>
                <div class="input-group"><label>الكونجرس (050):</label><input type="text" id="b050" oninput="upB()"></div>
                <div class="input-group"><label>المدخل الرئيسي (1xx):</label>
                    <select id="b1T" onchange="upB()"><option value="100">100 - شخص</option><option value="110">110 - هيئة</option><option value="130">130 - عنوان مقنن</option></select>
                    <input type="text" id="b1V" oninput="upB()">
                </div>
                <div class="input-group"><label>العنوان (245):</label><input type="text" id="b245a" placeholder="$a" oninput="upB()"><input type="text" id="b245b" placeholder="$b" oninput="upB()"></div>
                <div class="input-group"><label>المسؤولية (245$c):</label><input type="text" id="b245c" oninput="upB()"></div>
                <div class="input-group"><label>العناوين البديلة والأخرى (246):</label><input type="text" id="b246" oninput="upB()"></div>
                <div class="input-group"><label>النشر والوصف المادي:</label><input type="text" id="b260" placeholder="260" oninput="upB()"><input type="text" id="b300" placeholder="300" oninput="upB()"></div>
                
                <div class="input-group"><label>الموضوعات (600-651):</label>
                    <select id="b6T" onchange="upB()"><option value="650">650 - موضوع</option><option value="600">600 - شخص</option><option value="610">610 - هيئة</option><option value="651">651 - مكان</option></select>
                    <input type="text" id="b6V" oninput="upB()">
                </div>
                <div class="input-group"><label>مداخل إضافية (700-740):</label>
                    <select id="b7T" onchange="upB()"><option value="700">700 - شخص</option><option value="710">710 - هيئة</option><option value="740">740 - عنوان</option></select>
                    <input type="text" id="b7V" oninput="upB()">
                </div>

                <div class="input-group"><label>ملاحظات عامة (500):</label><input type="text" id="b500" oninput="upB()"></div>
                <div class="input-group"><label>ملاحظة ببليوجرافية (504):</label><input type="text" id="b504" oninput="upB()"></div>
                <div class="input-group"><label>الملخص / المستخلص (520):</label><textarea id="b520" rows="1" oninput="upB()"></textarea></div>
                <div class="input-group"><label>مصدر التزويد (900):</label><input type="text" id="b900" oninput="upB()"></div>
            </div>
        </div>
        <div class="preview-area">
            <div class="view-box"><div class="classic-card" id="bC"></div></div>
            <div class="view-box no-print"><div class="marc-view" id="bM"></div></div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="card no-print">
            <h3>توصيف المخطوطات (العناوين والبدايات والخواتيم)</h3>
            <div class="grid-form">
                <div class="input-group"><label>العناوين (245/246):</label><input type="text" id="m245" placeholder="الرئيسي" oninput="upM()"><input type="text" id="m246" placeholder="البديل/أخرى" oninput="upM()"></div>
                <div class="input-group"><label>المؤلف والناسخ:</label><input type="text" id="mAut" placeholder="المؤلف" oninput="upM()"><input type="text" id="mScr" placeholder="الناسخ" oninput="upM()"></div>
                <div class="input-group"><label>تاريخ النسخ والخط:</label><input type="text" id="mDat" placeholder="التاريخ" oninput="upM()"><input type="text" id="mFon" placeholder="الخط" oninput="upM()"></div>
                <div class="input-group"><label>التصنيف والحفظ:</label><input type="text" id="mCla" oninput="upM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>بداية المخطوط:</label><textarea id="mSta" oninput="upM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>خاتمة المخطوط:</label><textarea id="mEnd" oninput="upM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>التمليكات والقيود (541):</label><textarea id="mSea" oninput="upM()"></textarea></div>
                <div class="input-group"><label>رأس الموضوع (6xx):</label><input type="text" id="mSub" oninput="upM()"></div>
                <div class="input-group"><label>ملاحظات عامة (500):</label><input type="text" id="mNot" oninput="upM()"></div>
            </div>
        </div>
        <div class="preview-area">
            <div class="view-box"><div class="classic-card" id="mC"></div></div>
            <div class="view-box no-print"><div class="marc-view" id="mM"></div></div>
        </div>
    </div>

</div>

<footer>جميع الحقوق محفوظة للأستاذ عماد كاظم السعدي © 2026</footer>

<script>
    let data = [];
    function tab(p, b) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active'); document.getElementById(b).classList.add('active');
    }

    document.getElementById('xl').onchange = function(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type:'array'});
            data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            alert("تم الربط!");
        };
        r.readAsArrayBuffer(e.target.files[0]);
    };

    function doSearch() {
        const q = document.getElementById('q').value.toLowerCase();
        const res = data.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
        let h = '<table border="1" style="width:100%; border-collapse:collapse; background:#fff;"><tr>' + Object.keys(data[0] || {}).map(k=>`<th>${k}</th>`).join('') + '</tr>';
        res.forEach(r => h += '<tr>' + Object.values(r).map(v=>`<td>${v}</td>`).join('') + '</tr>');
        document.getElementById('res').innerHTML = h + '</table>';
    }

    function clr() { document.getElementById('q').value=""; document.getElementById('res').innerHTML=""; }

    function upB() {
        const v = id => document.getElementById(id).value;
        document.getElementById('bC').innerHTML = `<div class="card-class">ديوي: ${v('b082')}<br>LC: ${v('b050')}</div><div class="card-body"><b>${v('b1V')}</b><br>${v('b245a')} : ${v('b245b')} / ${v('b245c')}.<br>${v('b246')}<br>${v('b260')}. -- ${v('b300')}.<br>ملاحظات: ${v('b500')} ${v('b504')}<br>1. ${v('b6V')}. <br>أ. ${v('b7V')}</div>`;
        
        let m = `LDR 00000nam a2200000 u 4500\n<span class="tag">050</span> ## <span class="sub">$a</span> ${v('b050')}\n<span class="tag">082</span> ## <span class="sub">$a</span> ${v('b082')}\n<span class="tag">${v('b1T')}</span> 1# <span class="sub">$a</span> ${v('b1V')}\n<span class="tag">245</span> 10 <span class="sub">$a</span> ${v('b245a')} <span class="sub">$b</span> ${v('b245b')} <span class="sub">$c</span> ${v('b245c')}\n<span class="tag">246</span> ## <span class="sub">$a</span> ${v('b246')}\n<span class="tag">500</span> ## <span class="sub">$a</span> ${v('b500')}\n<span class="tag">504</span> ## <span class="sub">$a</span> ${v('b504')}\n<span class="tag">520</span> ## <span class="sub">$a</span> ${v('b520')}\n<span class="tag">${v('b6T')}</span> #4 <span class="sub">$a</span> ${v('b6V')}\n<span class="tag">${v('b7T')}</span> 1# <span class="sub">$a</span> ${v('b7V')}\n<span class="tag">900</span> ## <span class="sub">$a</span> ${v('b900')}`;
        document.getElementById('bM').innerHTML = m;
    }

    function upM() {
        const v = id => document.getElementById(id).value;
        document.getElementById('mC').innerHTML = `<div class="card-class">${v('mCla')}</div><div class="card-body"><b>${v('mAut')}</b><br>${v('m245')} [مخطوط].<br>${v('m246')}<br>نسخه: ${v('mScr')}، ${v('mDat')}. الخط: ${v('mFon')}.<br><b>البداية:</b> ${v('mSta')}<br><b>الخاتمة:</b> ${v('mEnd')}<br>${v('mSea')}<br>الموضوع: ${v('mSub')}<br>الملاحظات: ${v('mNot')}</div>`;
        
        let m = `LDR 00000nam a2200000 u 4500\n<span class="tag">090</span> ## <span class="sub">$a</span> ${v('mCla')}\n<span class="tag">100</span> 1# <span class="sub">$a</span> ${v('mAut')}\n<span class="tag">245</span> 10 <span class="sub">$a</span> ${v('m245')}\n<span class="tag">500</span> ## <span class="sub">$a</span> البداية: ${v('mSta')}\n<span class="tag">500</span> ## <span class="sub">$a</span> الخاتمة: ${v('mEnd')}\n<span class="tag">500</span> ## <span class="sub">$a</span> ملاحظات: ${v('mNot')}\n<span class="tag">541</span> ## <span class="sub">$a</span> ${v('mSea')}\n<span class="tag">650</span> #4 <span class="sub">$a</span> ${v('mSub')}\n<span class="tag">700</span> 1# <span class="sub">$a</span> ${v('mScr')} (ناسخ)`;
        document.getElementById('mM').innerHTML = m;
    }
</script>
</body>
</html>
