<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة السعدي الأكاديمية - الإصدار النهائي المعتمد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --save: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 20px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #555; font-size: 1.1rem; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 5px solid var(--primary); background: #f9f9f9; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .section-title { color: var(--secondary); border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; font-weight: bold; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .input-group { background: #fafafa; padding: 12px; border-radius: 10px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .repeat-box { display: flex; gap: 5px; margin-bottom: 5px; }
        label { font-weight: bold; font-size: 0.9rem; color: var(--primary); margin-bottom: 5px; }
        input, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; width: fit-content; }
        .btn-save { width: 100%; background: var(--save); color: white; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 20px; }
        .preview-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .classic-card { background: white; border: 1px solid #333; padding: 30px; min-height: 400px; line-height: 1.8; }
        .marc-view { background: #282c34; color: #9cdcfe; padding: 20px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; }
        .upload-card { border: 2px dashed var(--primary); padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <h1>منصة السعدي للفهرسة - مجهود الأستاذ عماد السعدي</h1>
</header>

<nav class="nav-tabs">
    <button class="active" onclick="tab('p1', this)">📚 الكتب (المداخل والمارك)</button>
    <button onclick="tab('p2', this)">📜 المخطوطات (مارك 21)</button>
    <button onclick="tab('p3', this)">📊 استيراد وإدارة الملفات</button>
</nav>

<div class="container">
    <div id="p1" class="page active">
        <div class="card">
            <h3 class="section-title">فهرسة الكتب - كافة المداخل ورؤوس الموضوعات</h3>
            <div class="grid-form">
                <div class="input-group" id="area-020"><label>ردمك (020) - مكرر:</label><div class="repeat-box"><input type="text" class="tag020" oninput="upB()"></div><button class="btn-add" onclick="add('area-020','tag020')">+ إضافة ISBN</button></div>
                <div class="input-group"><label>تصنيف ديوي (082):</label><input type="text" id="b082" oninput="upB()"></div>
                <div class="input-group"><label>تصنيف الكونجرس (050):</label><input type="text" id="b050" oninput="upB()"></div>
                <div class="input-group"><label>مدخل مؤلف (100):</label><input type="text" id="b100" oninput="upB()"></div>
                <div class="input-group"><label>مدخل هيئة (110):</label><input type="text" id="b110" oninput="upB()"></div>
                <div class="input-group"><label>مدخل مؤتمر (111):</label><input type="text" id="b111" oninput="upB()"></div>
                <div class="input-group"><label>عنوان موحد (130):</label><input type="text" id="b130" oninput="upB()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>العنوان والبيانات (245):</label><input type="text" id="b245" oninput="upB()"></div>
                <div class="input-group" id="area-650"><label>650 (موضوع عام):</label><div class="repeat-box"><input type="text" class="tag650" oninput="upB()"></div><button class="btn-add" onclick="add('area-650','tag650')">+ إضافة موضوع</button></div>
                <div class="input-group" id="area-700"><label>700 (مؤلف إضافي):</label><div class="repeat-box"><input type="text" class="tag700" oninput="upB()"></div><button class="btn-add" onclick="add('area-700','tag700')">+ إضافة</button></div>
                <div class="input-group"><label>بيانات النشر (260):</label><input type="text" id="b260" oninput="upB()"></div>
                <div class="input-group"><label>الوصف المادي (300):</label><input type="text" id="b300" oninput="upB()"></div>
                <div class="input-group"><label>ملاحظة ببليوجرافية (504):</label><textarea id="b504" oninput="upB()"></textarea></div>
                <div class="input-group"><label>مصدر التزويد (900):</label><textarea id="b900" oninput="upB()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>الرابط الإلكتروني (856):</label><input type="text" id="b856" oninput="upB()"></div>
            </div>
            <button class="btn-save" onclick="saveData('كتاب')">💾 حفظ الكتاب</button>
        </div>
        <div class="preview-area"><div id="bC" class="classic-card"></div><div id="bM" class="marc-view"></div></div>
    </div>

    <div id="p2" class="page">
        <div class="card">
            <h3 class="section-title">فهرسة المخطوطات - التوافق الكامل مع مارك 21</h3>
            <div class="grid-form">
                <div class="input-group"><label>رقم التصنيف والحفظ (090):</label><input type="text" id="m090" placeholder="مثلاً: 211/ ف.ج" oninput="upM()"></div>
                <div class="input-group"><label>عنوان المخطوط (245):</label><input type="text" id="m245" oninput="upM()"></div>
                <div class="input-group"><label>المؤلف (100):</label><input type="text" id="mAut" oninput="upM()"></div>
                <div class="input-group"><label>المصدر / المكتبة (500):</label><input type="text" id="mSrc" placeholder="اسم الخزانة أو المكتبة" oninput="upM()"></div>
                <div class="input-group"><label>اسم الناسخ (500 $a):</label><input type="text" id="mScr" oninput="upM()"></div>
                <div class="input-group"><label>تاريخ النسخ (260 $c):</label><input type="text" id="mDate" placeholder="مثلاً: 1240 هـ" oninput="upM()"></div>
                <div class="input-group" id="area-m650"><label>الموضوع (650) - مكرر:</label><div class="repeat-box"><input type="text" class="mtag650" oninput="upM()"></div><button class="btn-add" onclick="add('area-m650','mtag650')">+ إضافة موضوع</button></div>
                <div class="input-group" style="grid-column: span 2;"><label>بداية المخطوط وآخره (500):</label><textarea id="mSta" placeholder="أوله... وآخره..." oninput="upM()"></textarea></div>
            </div>
            <button class="btn-save" onclick="saveData('مخطوط')">💾 حفظ المخطوط</button>
        </div>
        <div class="preview-area"><div id="mC" class="classic-card"></div><div id="mM" class="marc-view"></div></div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <h3 class="section-title">تحميل ملفات الإكسيل (Excel Import)</h3>
            <div class="grid-form">
                <div class="upload-card"><b>ملف التصنيف</b><br><input type="file" accept=".xlsx, .xls"></div>
                <div class="upload-card"><b>ملف المؤلفين</b><br><input type="file" accept=".xlsx, .xls"></div>
                <div class="upload-card"><b>ملف الموضوعات</b><br><input type="file" accept=".xlsx, .xls"></div>
            </div>
            <button onclick="exportX()" style="margin-top:20px; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; width:100%;">📥 تصدير السجل العام</button>
            <div style="overflow-x:auto; margin-top:20px;">
                <table style="width:100%; border-collapse: collapse; background: white;" border="1">
                    <thead style="background:var(--primary); color:white;"><tr><th>النوع</th><th>العنوان</th><th>المؤلف/الناسخ</th><th>الموضوع/المصدر</th></tr></thead>
                    <tbody id="sBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let db = [];
    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function add(areaId, cls) {
        const div = document.createElement('div'); div.className = 'repeat-box';
        div.innerHTML = `<input type="text" class="${cls}" oninput="${cls.startsWith('m')?'upM()':'upB()'}">`;
        const container = document.getElementById(areaId);
        container.insertBefore(div, container.querySelector('button'));
    }
    function getAll(cls) { return Array.from(document.getElementsByClassName(cls)).map(i => i.value).filter(x => x); }
    
    function upB() {
        const v = id => document.getElementById(id)?.value || "";
        let m = "";
        getAll('tag020').forEach(x => m += `020 ## $a ${x}\n`);
        if(v('b100')) m += `100 1# $a ${v('b100')}\n`;
        if(v('b245')) m += `245 10 $a ${v('b245')}\n`;
        getAll('tag650').forEach(x => m += `650 #4 $a ${x}\n`);
        document.getElementById('bM').textContent = m;
        document.getElementById('bC').innerHTML = `<b>${v('b245')}</b><br>${v('b100')}`;
    }

    function upM() {
        const v = id => document.getElementById(id)?.value || "";
        const topics = getAll('mtag650');
        let marc = "";
        if(v('m090')) marc += `090 ## $a ${v('m090')}\n`;
        if(v('mAut')) marc += `100 1# $a ${v('mAut')}\n`;
        if(v('m245')) marc += `245 10 $a ${v('m245')}\n`;
        if(v('mDate')) marc += `260 ## $c ${v('mDate')}\n`;
        topics.forEach(t => marc += `650 #4 $a ${t}\n`);
        if(v('mSrc')) marc += `500 ## $a المصدر: ${v('mSrc')}\n`;
        if(v('mScr')) marc += `500 ## $a الناسخ: ${v('mScr')}\n`;
        if(v('mSta')) marc += `500 ## $a الوصف: ${v('mSta')}`;

        document.getElementById('mM').textContent = marc;
        document.getElementById('mC').innerHTML = `<center><b>بِطاقة مَخطوط</b></center><br><b>العنوان:</b> ${v('m245')}<br><b>التصنيف:</b> ${v('m090')}<br><b>الموضوع:</b> ${topics.join(' - ')}<hr><b>الناسخ:</b> ${v('mScr')}<br><b>التاريخ:</b> ${v('mDate')}`;
    }

    function saveData(t) {
        const v = id => document.getElementById(id)?.value || "";
        let r = { t, tit: (t==='كتاب'?v('b245'):v('m245')), aut: (t==='كتاب'?v('b100'):v('mScr')), sub: (t==='كتاب'?v('b082'):v('m090')) };
        db.push(r);
        document.getElementById('sBody').innerHTML = db.map(i => `<tr><td>${i.t}</td><td>${i.tit}</td><td>${i.aut}</td><td>${i.sub}</td></tr>`).join('');
        alert("تم الحفظ بنجاح!");
    }

    function exportX() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Archive");
        XLSX.writeFile(wb, "Sadi_Database.xlsx");
    }
</script>
</body>
</html>
