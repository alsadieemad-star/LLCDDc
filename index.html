<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الفهرسة المتطور - عماد كاظم السعدي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--gray); margin: 0; padding: 20px; padding-bottom: 80px; }
        .container { max-width: 1150px; margin: auto; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .nav { display: flex; background: #eee; border-bottom: 1px solid #ddd; }
        .nav button { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .nav button.active { background: white; color: var(--accent); border-bottom: 3px solid var(--accent); }
        
        .content { padding: 30px; }
        .page { display: none; }
        .active { display: block; }
        
        /* تقسيم الحقول */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .full-width { grid-column: span 2; }

        /* منطقة المعاينة */
        .preview-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .preview-box { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fff; }
        .preview-title { font-weight: bold; margin-bottom: 10px; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; }

        /* البطاقة التقليدية 3*5 */
        .classic-card { 
            width: 100%; min-height: 250px; border: 1px solid #999; padding: 20px; 
            font-family: 'Times New Roman', Times, serif; font-size: 14px; line-height: 1.4; position: relative; background: #fff;
        }
        .card-class { position: absolute; top: 20px; right: 20px; font-weight: bold; width: 60px; }
        .card-body { margin-right: 80px; text-align: justify; }
        .hanging-indent { padding-right: 20px; text-indent: -20px; }

        /* سجل مارك */
        .marc-view { font-family: monospace; background: #2d3436; color: #00d2d3; padding: 15px; border-radius: 5px; direction: ltr; text-align: left; overflow-x: auto; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button.btn { padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; }
        .btn-save { background: var(--accent); }
        .btn-print { background: #576574; }
        .btn-excel { background: #1d6f42; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: white; text-align: center; padding: 12px 0; font-size: 14px; z-index: 1000; }

        @media print {
            body * { visibility: hidden; }
            .classic-card, .classic-card * { visibility: visible; }
            .classic-card { position: absolute; left: 0; top: 0; width: 5in; height: 3in; border: none; }
            footer { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>نظام الفهرسة الأكاديمي المتكامل</h1>
        <p>إشراف وتطوير: عماد كاظم السعدي</p>
    </div>

    <div class="nav">
        <button id="t1" class="active" onclick="showP('searchP', 't1')">محرك البحث</button>
        <button id="t2" onclick="showP('inputP', 't2')">مركز الفهرسة والبطاقات</button>
    </div>

    <div class="content">
        <div id="searchP" class="page active">
            <label>تحميل قاعدة البيانات (Excel):</label>
            <input type="file" id="xlIn" accept=".xlsx, .xls" style="margin-bottom:20px;">
            <input type="text" id="q" placeholder="ابحث في العناوين، المؤلفين، أو رؤوس الموضوعات...">
            <div class="btn-group">
                <button class="btn" style="background:var(--primary)" onclick="search('in')">يحتوي على</button>
                <button class="btn" style="background:#2980b9" onclick="search('start')">يبدأ بـ</button>
                <button class="btn" style="background:var(--danger)" onclick="location.reload()">تفريغ النتائج</button>
            </div>
            <div id="res" style="margin-top:20px;"></div>
        </div>

        <div id="inputP" class="page">
            <div class="grid-form">
                <div class="input-group"><label>المؤلف (100):</label><input type="text" id="m100" oninput="updateV()"></div>
                <div class="input-group"><label>العنوان الرئيسي (245$a):</label><input type="text" id="m245a" oninput="updateV()">
