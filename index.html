<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السعدي الاحترافية المتكاملة 2026</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/library.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --accent: #27ae60; --bg: #f4f7f6; --code-bg: #282c34; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .nav-tabs button { flex: 1; padding: 18px; border: none; background: none; font-weight: bold; cursor: pointer; color: #555; transition: 0.3s; white-space: nowrap; }
        .nav-tabs button.active { color: var(--primary); background: #f9f9f9; border-bottom: 5px solid var(--primary); }
        .container { max-width: 1350px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; border-top: 5px solid var(--primary); }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; background: #fafafa; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; color: var(--primary); }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; }
        .preview-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 25px; }
        .classic-card { width: 100%; min-height: 280px; border: 1px solid #333; padding: 25px; font-family: 'Times New Roman', serif; position: relative; line-height: 1.5; background: #fff; }
        .card-class { position: absolute; top: 25px; right: 25px; font-weight: bold; }
        .card-body { margin-right: 90px; text-align: justify; }
        .marc-view { background: var(--code-bg); color: #9cdcfe; padding: 15px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; }
        .tag { color: #e06c75; font-weight: bold; }
        .sub { color: #d19a66; }
        .btn { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
        footer { background: var(--primary); color: white; text-align: center; padding: 15px; position: fixed; bottom: 0; width: 100%; }
        @media print { .no-print { display: none !important; } .classic-card { border: none !important; } }
    </style>
</head>
<body>

<header>
    <h1>نظام السعدي المتكامل للفهرسة والاستناد</h1>
    <p>بإشراف الخبير الأستاذ عماد كاظم السعدي © 2026</p>
</header>

<nav class="nav-tabs no-print">
    <button id="t1" class="active" onclick="showTab('searchPage', 't1')">🔍 البحث والاستناد</button>
    <button id="t2" onclick="showTab('booksPage', 't2')">📚 فهرسة الكتب</button>
    <button id="t3" onclick="showTab('manusPage', 't3')">📜 فهرسة المخطوطات</button>
</nav>

<div class="container">

    <div id="searchPage" class="page active">
        <div class="card">
            <h3>الملف الاستنادي (Excel)</h3>
            <input type="file" id="xlLoad" accept=".xlsx, .xls" style="margin-bottom:15px;">
            <div style="display:flex; gap:10px;">
                <input type="text" id="sq" style="flex:2;" placeholder="ابحث عن موضوع أو مؤلف...">
                <button class="btn" style="background:var(--primary)" onclick="doSearch()">يحتوي على</button>
                <button class="btn" style="background:var(--secondary)" onclick="clearSearch()">تفريغ البحث</button>
            </div>
            <div id="resArea" style="margin-top:20px; overflow-x:auto;"></div>
        </div>
    </div>

    <div id="booksPage" class="page">
        <div class="card no-print">
            <h3>فهرسة الكتب والمداخل (MARC 21)</h3>
            <div class="grid-form">
                <div class="input-group">
                    <label>المدخل الرئيسي (1xx):</label>
                    <select id="b1xxT" onchange="runB()"><option value="100">100 - اسم شخص</option><option value="110">110 - هيئة</option><option value="111">111 - ملتقى</option><option value="130">130 - عنوان مقنن</option></select>
                    <input type="text" id="b1xxV" oninput="runB()">
                </div>
                <div class="input-group"><label>العنوان الرئيسي (245$a):</label><input type="text" id="b245a" oninput="runB()"></div>
                <div class="input-group"><label>العنوان الفرعي والمسؤولية:</label><input type="text" id="b245bc" oninput="runB()"></div>
                <div class="input-group"><label>عناوين أخرى/بديلة:</label><input type="text" id="bOtherT" oninput="runB()"></div>
                
                <div class="input-group">
                    <label>نظام ورقم التصنيف:</label>
                    <select id="bCType" onchange="runB()"><option value="082">082 - ديوي</option><option value="050">050 - الكونجرس</option></select>
                    <input type="text" id="bCVal" oninput="runB()">
                </div>

                <div class="input-group">
                    <label>الموضوعات (600-651):</label>
                    <select id="b6xxT" onchange="runB()"><option value="650">650 - موضوع عام</option><option value="600">600 - اسم شخص</option><option value="610">610 - هيئة</option><option value="611">611 - ملتقى</option><option value="630">630 - عنوان مقنن</option><option value="651">651 - مكان</option></select>
                    <input type="text" id="b6xxV" oninput="runB()">
                </div>

                <div class="input-group">
                    <label>المداخل الإضافية (700-740):</label>
                    <select id="b7xxT" onchange="runB()"><option value="700">700 - شخص إضافي</option><option value="710">710 - هيئة إضافية</option><option value="711">711 - ملتقى إضافي</option><option value="740">740 - عنوان إضافي</option></select>
                    <input type="text" id="b7xxV" oninput="runB()">
                </div>

                <div class="input-group"><label>النشر والوصف المادي:</label><input type="text" id="b260" oninput="runB()"></div>
                <div class="input-group"><label>بيانات التزويد (900):</label><input type="text" id="b900" oninput="runB()"></div>
            </div>
        </div>
        <div class="preview-area">
            <div class="view-box"><div class="classic-card" id="bCard"></div></div>
            <div class="view-box no-print"><div class="marc-view" id="bMarc"></div></div>
        </div>
    </div>

    <div id="manusPage" class="page">
        <div class="card no-print">
            <h3>توصيف المخطوطات الأكاديمي</h3>
            <div class="grid-form">
                <div class="input-group"><label>العنوان الرئيسي:</label><input type="text" id="mTit" oninput="runM()"></div>
                <div class="input-group"><label>العنوان الفرعي / البديل:</label><input type="text" id="mSub" oninput="runM()"></div>
                <div class="input-group"><label>العناوين الأخرى:</label><input type="text" id="mOth" oninput="runM()"></div>
                <div class="input-group"><label>المؤلف والناسخ:</label><input type="text" id="mAuth" placeholder="المؤلف" oninput="runM()"><input type="text" id="mScribe" placeholder="الناسخ" oninput="runM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>بداية المخطوط:</label><textarea id="mStart" rows="2" oninput="runM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>خاتمة المخطوط:</label><textarea id="mEnd" rows="2" oninput="runM()"></textarea></div>
                <div class="input-group"><label>تاريخ النسخ والخط:</label><input type="text" id="mDate" placeholder="التاريخ" oninput="runM()"><input type="text" id="mFont" placeholder="نوع الخط" oninput="runM()"></div>
                <div class="input-group"><label>رقم التصنيف والحفظ:</label><input type="text" id="mClass" oninput="runM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>التمليكات والأختام والقيود:</label><textarea id="mSeal" oninput="runM()"></textarea></div>
            </div>
        </div>
        <div class="preview-area">
            <div class="view-box"><div class="classic-card" id="mCard"></div></div>
            <div class="view-box no-print"><div class="marc-view" id="mMarc"></div></div>
        </div>
    </div>

</div>

<footer>جميع الحقوق محفوظة للأستاذ عماد كاظم السعدي © 2026</footer>

<script>
    let masterDb = [];
    function showTab(p, t) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active'); document.getElementById(t).classList.add('active');
    }

    document.getElementById('xlLoad').addEventListener('change', function(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type:'array'});
            masterDb = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            alert("تم تحميل الملف الاستنادي بنجاح!");
        };
        r.readAsArrayBuffer(e.target.files[0]);
    });

    function doSearch() {
        const q = document.getElementById('sq').value.toLowerCase();
        const res = masterDb.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
        let h = '<table border="1" style="width:100%; border-collapse:collapse; background:white;"><tr>' + Object.keys(masterDb[0] || {}).map(k=>`<th>${k}</th>`).join('') + '</tr>';
        res.forEach(r => h += '<tr>' + Object.values(r).map(v=>`<td>${v}</td>`).join('') + '</tr>');
        document.getElementById('resArea').innerHTML = h + '</table>';
    }

    function clearSearch() { document.getElementById('sq').value=""; document.getElementById('resArea').innerHTML=""; }

    function runB() {
        const v = id => document.getElementById(id).value;
        document.getElementById('bCard').innerHTML = `<div class="card-class">${v('bCVal')}</div><div class="card-body"><b>${v('b1xxV')}</b><br>${v('b245a')} : ${v('b245bc')}.<br>${v('bOtherT')}<br>${v('b260')}.<br>1. ${v('b6xxV')}. <br>أ. ${v('b7xxV')}</div>`;
        
        let m = `LDR 00000nam a2200000 u 4500\n<span class="tag">${v('bCType')}</span> ## <span class="sub">$a</span> ${v('bCVal')}\n<span class="tag">${v('b1xxT')}</span> 1# <span class="sub">$a</span> ${v('b1xxV')}\n<span class="tag">245</span> 10 <span class="sub">$a</span> ${v('b245a')} <span class="sub">$c</span> ${v('b245bc')}\n<span class="tag">246</span> ## <span class="sub">$a</span> ${v('bOtherT')}\n<span class="tag">260</span> ## <span class="sub">$a</span> ${v('b260')}\n<span class="tag">${v('b6xxT')}</span> #4 <span class="sub">$a</span> ${v('b6xxV')}\n<span class="tag">${v('b7xxT')}</span> 1# <span class="sub">$a</span> ${v('b7xxV')}\n<span class="tag">900</span> ## <span class="sub">$a</span> ${v('b900')}`;
        document.getElementById('bMarc').innerHTML = m;
    }

    function runM() {
        const v = id => document.getElementById(id).value;
        document.getElementById('mCard').innerHTML = `<div class="card-class">${v('mClass')}</div><div class="card-body"><b>${v('mAuth')}</b><br>${v('mTit')} [مخطوط].<br>العنوان البديل: ${v('mSub')}<br>عناوين أخرى: ${v('mOth')}<br>نسخه: ${v('mScribe')}، ${v('mDate')}.<br>الخط: ${v('mFont')}.<br><b>البداية:</b> ${v('mStart')}<br><b>الخاتمة:</b> ${v('mEnd')}<br>${v('mSeal')}</div>`;
        
        let m = `LDR 00000nam a2200000 u 4500\n<span class="tag">090</span> ## <span class="sub">$a</span> ${v('mClass')}\n<span class="tag">100</span> 1# <span class="sub">$a</span> ${v('mAuth')}\n<span class="tag">245</span> 10 <span class="sub">$a</span> ${v('mTit')}\n<span class="tag">246</span> ## <span class="sub">$a</span> ${v('mSub')}\n<span class="tag">500</span> ## <span class="sub">$a</span> بداية المخطوط: ${v('mStart')}\n<span class="tag">500</span> ## <span class="sub">$a</span> خاتمة المخطوط: ${v('mEnd')}\n<span class="tag">541</span> ## <span class="sub">$a</span> ${v('mSeal')}\n<span class="tag">546</span> ## <span class="sub">$a</span> نوع الخط: ${v('mFont')}\n<span class="tag">700</span> 1# <span class="sub">$a</span> ${v('mScribe')} (ناسخ)`;
        document.getElementById('mMarc').innerHTML = m;
    }
</script>
</body>
</html>
