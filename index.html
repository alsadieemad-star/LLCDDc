<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة السعدي الاحترافية - الإصدار الأكاديمي الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --save: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 3px solid var(--secondary); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #555; }
        .nav-tabs button.active { color: var(--primary); border-bottom: 5px solid var(--primary); background: #f9f9f9; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .section-title { color: var(--secondary); border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; font-weight: bold; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .input-group { background: #fafafa; padding: 12px; border-radius: 10px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .repeat-box { display: flex; gap: 5px; margin-bottom: 5px; }
        label { font-weight: bold; font-size: 0.85rem; color: var(--primary); margin-bottom: 5px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; margin-top: 5px; width: fit-content; }
        .btn-save { width: 100%; background: var(--save); color: white; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 20px; }
        .preview-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 20px; }
        .classic-card { background: white; border: 1px solid #333; padding: 30px; min-height: 400px; line-height: 1.6; }
        .marc-view { background: #282c34; color: #9cdcfe; padding: 20px; border-radius: 10px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>منصة السعدي الاحترافية للفهرسة - مجهود الأستاذ عماد السعدي</h1>
</header>

<nav class="nav-tabs">
    <button class="active" onclick="tab('p1', this)">📚 الكتب (المداخل والموضوعات)</button>
    <button onclick="tab('p2', this)">📜 المخطوطات</button>
    <button onclick="tab('p3', this)">📊 السجل</button>
</nav>

<div class="container">
    <div id="p1" class="page active">
        <div class="card">
            <h3 class="section-title">فهرسة الكتب - مداخل رئيسية وفرعية وموضوعات مكررة</h3>
            <div class="grid-form">
                <div class="input-group"><label>تصنيف ديوي (082):</label><input type="text" id="b082" oninput="upB()"></div>
                <div class="input-group"><label>تصنيف الكونجرس (050):</label><input type="text" id="b050" oninput="upB()"></div>
                <div class="input-group"><label>مؤلف (100):</label><input type="text" id="b100" oninput="upB()"></div>
                <div class="input-group"><label>هيئة (110):</label><input type="text" id="b110" oninput="upB()"></div>
                <div class="input-group"><label>مؤتمر (111):</label><input type="text" id="b111" oninput="upB()"></div>
                <div class="input-group"><label>عنوان موحد (130):</label><input type="text" id="b130" oninput="upB()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>العنوان والبيانات (245):</label><input type="text" id="b245" oninput="upB()"></div>

                <div class="input-group" id="area-600"><label>رؤوس موضوعات - أشخاص (600):</label><div class="repeat-box"><input type="text" class="tag600" oninput="upB()"></div><button class="btn-add" onclick="add('area-600','tag600')">+ إضافة</button></div>
                <div class="input-group" id="area-610"><label>رؤوس موضوعات - هيئات (610):</label><div class="repeat-box"><input type="text" class="tag610" oninput="upB()"></div><button class="btn-add" onclick="add('area-610','tag610')">+ إضافة</button></div>
                <div class="input-group" id="area-650"><label>رؤوس موضوعات - عامة (650):</label><div class="repeat-box"><input type="text" class="tag650" oninput="upB()"></div><button class="btn-add" onclick="add('area-650','tag650')">+ إضافة</button></div>

                <div class="input-group" id="area-700"><label>مداخل إضافية - أشخاص (700):</label><div class="repeat-box"><input type="text" class="tag700" oninput="upB()"></div><button class="btn-add" onclick="add('area-700','tag700')">+ إضافة</button></div>
                <div class="input-group" id="area-710"><label>مداخل إضافية - هيئات (710):</label><div class="repeat-box"><input type="text" class="tag710" oninput="upB()"></div><button class="btn-add" onclick="add('area-710','tag710')">+ إضافة</button></div>
                <div class="input-group" id="area-740"><label>مداخل إضافية - عناوين (740):</label><div class="repeat-box"><input type="text" class="tag740" oninput="upB()"></div><button class="btn-add" onclick="add('area-740','tag740')">+ إضافة</button></div>

                <div class="input-group"><label>بيانات النشر (260):</label><input type="text" id="b260" oninput="upB()"></div>
                <div class="input-group"><label>الوصف المادي (300):</label><input type="text" id="b300" oninput="upB()"></div>
                <div class="input-group"><label>ملاحظة ببليوجرافية (504):</label><textarea id="b504" oninput="upB()"></textarea></div>
                <div class="input-group"><label>مصدر التزويد (900):</label><textarea id="b900" oninput="upB()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>الرابط الإلكتروني (856):</label><input type="text" id="b856" oninput="upB()"></div>
            </div>
            <button class="btn-save" onclick="saveData('كتاب')">💾 حفظ الكتاب</button>
        </div>
        <div class="preview-area"><div id="bC" class="classic-card"></div><div id="bM" class="marc-view"></div></div>
    </div>

    <div id="p2" class="page">
        <div class="card">
            <h3 class="section-title">فهرسة المخطوطات الأكاديمية</h3>
            <div class="grid-form">
                <div class="input-group"><label>العنوان:</label><input type="text" id="m245" oninput="upM()"></div>
                <div class="input-group"><label>المؤلف:</label><input type="text" id="mAut" oninput="upM()"></div>
                <div class="input-group"><label>المصدر (المكتبة):</label><input type="text" id="mSrc" oninput="upM()"></div>
                <div class="input-group"><label>اسم الناسخ:</label><input type="text" id="mScr" oninput="upM()"></div>
                <div class="input-group"><label>تاريخ النسخ:</label><input type="text" id="mDate" oninput="upM()"></div>
                <div class="input-group"><label>رقم الحفظ:</label><input type="text" id="mCla" oninput="upM()"></div>
                <div class="input-group" style="grid-column: span 2;"><label>أول المخطوط:</label><textarea id="mSta" oninput="upM()"></textarea></div>
                <div class="input-group" style="grid-column: span 2;"><label>آخر المخطوط:</label><textarea id="mEnd" oninput="upM()"></textarea></div>
            </div>
            <button class="btn-save" onclick="saveData('مخطوط')">💾 حفظ المخطوط</button>
        </div>
        <div class="preview-area"><div id="mC" class="classic-card"></div><div id="mM" class="marc-view"></div></div>
    </div>

    <div id="p3" class="page">
        <div class="card">
            <button onclick="exportX()">📥 تصدير Excel</button>
            <table style="width:100%; margin-top:15px; border-collapse: collapse;" border="1">
                <thead><tr><th>النوع</th><th>العنوان</th><th>المداخل</th><th>الموضوعات</th><th>الرابط/المصدر</th></tr></thead>
                <tbody id="sBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let db = [];
    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function add(areaId, cls) {
        const div = document.createElement('div'); div.className = 'repeat-box';
        div.innerHTML = `<input type="text" class="${cls}" oninput="upB()">`;
        const container = document.getElementById(areaId);
        container.insertBefore(div, container.querySelector('button'));
    }
    function getAll(cls) { return Array.from(document.getElementsByClassName(cls)).map(i => i.value).filter(x => x); }
    function upB() {
        const v = id => document.getElementById(id)?.value || "";
        let marc = "";
        if(v('b082')) marc += `082 ## $a ${v('b082')}\n`;
        if(v('b100')) marc += `100 1# $a ${v('b100')}\n`;
        getAll('tag650').forEach(x => marc += `650 #0 $a ${x}\n`);
        getAll('tag700').forEach(x => marc += `700 1# $a ${x}\n`);
        marc += `856 4# $u ${v('b856')}\n900 ## $a ${v('b900')}`;
        
        document.getElementById('bM').textContent = marc;
        document.getElementById('bC').innerHTML = `<b>العنوان:</b> ${v('b245')}<br><b>المؤلف:</b> ${v('b100')}<br><b>الموضوعات:</b> ${getAll('tag650').join(' ; ')}`;
    }
    function upM() {
        const v = id => document.getElementById(id).value;
        document.getElementById('mC').innerHTML = `<b>المخطوط:</b> ${v('m245')}<br><b>الناسخ:</b> ${v('mScr')}<br><b>التاريخ:</b> ${v('mDate')}`;
        document.getElementById('mM').textContent = `245 $a ${v('m245')}\n500 $a الناسخ: ${v('mScr')}\n500 $a التاريخ: ${v('mDate')}\n500 $a المصدر: ${v('mSrc')}`;
    }
    function saveData(t) {
        const v = id => document.getElementById(id)?.value || "";
        let r = { t, tit: (t==='كتاب'?v('b245'):v('m245')), aut: (t==='كتاب'?v('b100'):v('mScr')), sub: (t==='كتاب'?getAll('tag650').join('|'):v('mSrc')), link: (t==='كتاب'?v('b856'):v('mDate')) };
        db.push(r);
        document.getElementById('sBody').innerHTML = db.map(i => `<tr><td>${i.t}</td><td>${i.tit}</td><td>${i.aut}</td><td>${i.sub}</td><td>${i.link}</td></tr>`).join('');
        alert("تم الحفظ بنجاح!");
    }
    function exportX() {
        const ws = XLSX.utils.json_to_sheet(db);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, "Sadi_Database.xlsx");
    }
</script>
</body>
</html>
