<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السعدي للفهرسة والمخطوطات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --accent: #27ae60; --danger: #b21f1f; --code-bg: #282c34; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, var(--primary), #2a4858); color: white; padding: 15px; text-align: center; }
        
        .tabs-nav { display: flex; background: #fff; border-bottom: 2px solid #ddd; sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .tabs-nav button { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; white-space: nowrap; color: #555; }
        .tabs-nav button.active { color: var(--primary); border-bottom: 4px solid var(--accent); background: #f9f9f9; }

        .container { max-width: 1250px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 20px; }
        .page { display: none; }
        .page.active { display: block; }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }

        .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 25px; }
        .view-box { border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: #fff; }
        .marc-area { background: var(--code-bg); color: #abb2bf; padding: 15px; border-radius: 8px; direction: ltr; text-align: left; font-family: monospace; white-space: pre-wrap; font-size: 0.9rem; }
        
        .catalog-card { width: 100%; min-height: 250px; border: 1px solid #000; padding: 20px; font-family: 'Times New Roman', serif; position: relative; box-sizing: border-box; background: #fff; }
        .class-no { position: absolute; top: 20px; right: 20px; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
        
        footer { background: var(--primary); color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>نظام السعدي المتكامل للفهرسة والاستناد</h1>
    <p>جميع الحقوق محفوظة © عماد كاظم السعدي</p>
</header>

<div class="tabs-nav no-print">
    <button id="t1" class="active" onclick="showPage('pSearch', 't1')">🔍 البحث والاستناد</button>
    <button id="t2" onclick="showPage('pBooks', 't2')">📚 فهرسة الكتب</button>
    <button id="t3" onclick="showPage('pManus', 't3')">📜 فهرسة المخطوطات</button>
</div>

<div class="container">
    
    <div id="pSearch" class="page active">
        <div class="card">
            <h3>الملف الاستنادي وقاعدة البيانات</h3>
            <input type="file" id="xlLoad" accept=".xlsx, .xls" style="margin-bottom:15px;">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="sq" placeholder="بحث في الموضوعات، المؤلفين، أو التصنيف...">
                <button class="btn" style="background:var(--primary)" onclick="search('in')">يحتوي على</button>
                <button class="btn" style="background:#2980b9" onclick="search('start')">يبدأ بـ</button>
                <button class="btn" style="background:var(--danger)" onclick="clearSearch()">تفريغ البحث</button>
            </div>
            <div id="resArea" style="overflow-x:auto; max-height:400px;"></div>
        </div>
    </div>

    <div id="pBooks" class="page">
        <div class="card">
            <h3>إدخال سجل كتاب (MARC 21)</h3>
            <div class="grid-inputs">
                <div><label>نوع المؤلف الاستنادي:</label>
                    <select id="bAuthTag" onchange="upB()"><option value="100">100 - اسم شخص</option><option value="110">110 - هيئة</option><option value="111">111 - ملتقى/مؤتمر</option><option value="130">130 - عنوان مقنن</option></select>
                </div>
                <div><label>اسم المؤلف/الهيئة:</label><input type="text" id="bAuth" oninput="upB()"></div>
                <div><label>العنوان الرئيسي (245$a):</label><input type="text" id="b245a" oninput="upB()"></div>
                <div><label>العنوان الفرعي (245$b):</label><input type="text" id="b245b" oninput="upB()"></div>
                <div><label>بيان المسؤولية (245$c):</label><input type="text" id="b245c" oninput="upB()"></div>
                <div><label>رقم التصنيف (استنادي):</label><input type="text" id="bClass" oninput="upB()"></div>
                <div><label>الموضوعات (استنادي):</label><input type="text" id="bSubj" oninput="upB()"></div>
                <div><label>بيان النشر (260):</label><input type="text" id="b260" oninput="upB()"></div>
            </div>
            <div class="preview-grid">
                <div class="view-box"><div class="catalog-card" id="bCard"></div></div>
                <div class="view-box"><div class="marc-area" id="bMarc"></div></div>
            </div>
        </div>
    </div>

    <div id="pManus" class="page">
        <div class="card">
            <h3>فهرسة المخطوطات</h3>
            <div class="grid-inputs">
                <div><label>العنوان الرئيسي:</label><input type="text" id="mTit" oninput="upM()"></div>
                <div><label>العنوان الفرعي/البديل:</label><input type="text" id="mSub" oninput="upM()"></div>
                <div><label>المؤلف:</label><input type="text" id="mAuth" oninput="upM()"></div>
                <div><label>الناسخ:</label><input type="text" id="mScribe" oninput="upM()"></div>
                <div><label>تاريخ النسخ:</label><input type="text" id="mDate" oninput="upM()"></div>
                <div><label>نوع الخط:</label><input type="text" id="mFont" oninput="upM()"></div>
                <div><label>رقم التصنيف:</label><input type="text" id="mClass" oninput="upM()"></div>
                <div><label>التمليكات والأختام:</label><input type="text" id="mSeal" oninput="upM()"></div>
                <div style="grid-column: span 2;"><label>الملاحظات:</label><textarea id="mNotes" oninput="upM()"></textarea></div>
            </div>
            <div class="preview-grid">
                <div class="view-box"><div class="catalog-card" id="mCard"></div></div>
                <div class="view-box"><div class="marc-area" id="mMarc"></div></div>
            </div>
        </div>
    </div>

</div>

<footer>جميع الحقوق محفوظة © عماد كاظم السعدي 2026</footer>

<script>
    let mainDb = [];

    function showPage(p, b) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tabs-nav button').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById(b).classList.add('active');
    }

    document.getElementById('xlLoad').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type: 'array'});
            mainDb = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            alert("تم تحميل الملف الاستنادي بنجاح!");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function search(mode) {
        const q = document.getElementById('sq').value.toLowerCase();
        const res = mainDb.filter(r => Object.values(r).some(v => mode==='in' ? String(v).toLowerCase().includes(q) : String(v).toLowerCase().startsWith(q)));
        let h = '<table border="1" style="width:100%; border-collapse:collapse;"><tr>' + Object.keys(mainDb[0] || {}).map(k=>`<th style="background:#eee;">${k}</th>`).join('') + '</tr>';
        res.forEach(r => h += '<tr>' + Object.values(r).map(v=>`<td>${v}</td>`).join('') + '</tr>');
        document.getElementById('resArea').innerHTML = h + '</table>';
    }

    function clearSearch() {
        document.getElementById('sq').value = "";
        document.getElementById('resArea').innerHTML = "";
    }

    // تحديث الكتب
    function upB() {
        const val = id => document.getElementById(id).value;
        const tag = val('bAuthTag');
        document.getElementById('bCard').innerHTML = `<div class="class-no">${val('bClass')}</div><b>${val('bAuth')}</b><br>${val('b245a')} : ${val('b245b')} / ${val('b245c')}.<br>${val('b260')}<br>1. ${val('bSubj')}`;
        let m = `LDR 00000nam a2200000 u 4500\n082 ## $a ${val('bClass')}\n${tag} 1# $a ${val('bAuth')}\n245 10 $a ${val('b245a')} $b ${val('b245b')} $c ${val('b245c')}\n650 #4 $a ${val('bSubj')}`;
        document.getElementById('bMarc').innerText = m;
    }

    // تحديث المخطوطات
    function upM() {
        const val = id => document.getElementById(id).value;
        document.getElementById('mCard').innerHTML = `<div class="class-no">${val('mClass')}</div><b>${val('mAuth')}</b><br>${val('mTit')} [مخطوط] : ${val('mSub')}<br>نسخه: ${val('mScribe')} بتاريخ ${val('mDate')}<br>نوع الخط: ${val('mFont')}<br>${val('mSeal')}`;
        let m = `LDR 00000nam a2200000 u 4500\n090 ## $a ${val('mClass')}\n100 1# $a ${val('mAuth')}\n245 10 $a ${val('mTit')} $b ${val('mSub')}\n546 ## $a نوع الخط: ${val('mFont')}\n700 1# $a ${val('mScribe')} (ناسخ)\n541 ## $a ${val('mSeal')}`;
        document.getElementById('mMarc').innerText = m;
    }
</script>
</body>
</html>
